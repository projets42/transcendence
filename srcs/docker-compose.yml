services:
  db:
    container_name: db
    image: postgres:latest
    environment:
      - POSTGRES_USER=${SQL_USER}
      - POSTGRES_PASSWORD=${SQL_PASSWORD}
      - POSTGRES_DB=${SQL_DATABASE}
    ports:
      - "5432:5432"
    networks:
      - transcendence
    volumes:
      - pgdata:/var/lib/postgresql/data/

  nginx:
    container_name: nginx
    build:
      context: ./app/nginx
      dockerfile: Dockerfile
    ports:
      - "8443:443"
    restart: on-failure
    depends_on:
      - django
    networks:
      - transcendence

  django:
    container_name: django
    build:
      context: ./app/django
      dockerfile: Dockerfile
    ports:
      - 8000:8000
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - ./.env
    depends_on:
      - db
    networks:
      - transcendence
    volumes:
      - ./app/django/:/usr/src/app/

volumes:
  pgdata:
    name: pgdata
    external: true

networks:
  transcendence:
    name: transcendence
    driver: bridge