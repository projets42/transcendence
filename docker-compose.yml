services:
  postgresql:
    container_name: postgre
    build: ./postgresql
    restart: always
    env_file: .env
    # expose:
    #   - "5432"
    ports:
      - "5432:5432"
    # volumes:
    #   - voldb:/var/lib/postgresql/data
    networks:
      - trscd
  nginx:
    container_name: ngx
    build: ./nginx
    restart: on-failure
    depends_on:
      - django
    ports:
      - "443:443"
    # volumes:
    #   - website:/var/www/html
    networks:
      - trscd
  django:
    container_name: django
    env_file: .env
    build: ./django
    restart: always
    depends_on:
      - postgresql
    ports:
      - "8000:8000"
    # expose:
    #   - "8000"
    # volumes:
    #   - website:/var/www/html
    networks:
      - trscd
# volumes:
#   voldb:
#     driver: local
#     driver_opts:
#       type: 'none'
#       o: 'bind'
#       device: '/home/smalloir/data'
networks:
  trscd:
    driver: bridge
